<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cleanner — Simulateur Bot</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
  .demo-banner{background:#1a1a2e;color:#e2e8f0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:7px 18px;border-radius:20px;margin-bottom:14px;font-weight:600}
  .scenario-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  .scenario-label{font-size:11px;color:#6b7280;font-weight:500}
  .scenario-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #d1d5db;background:white;font-size:12px;font-weight:500;cursor:pointer;color:#374151;transition:all .15s}
  .scenario-btn.active{background:#25D366;border-color:#25D366;color:white}
  .phone{width:100%;max-width:390px;background:white;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.18);display:flex;flex-direction:column;height:720px;max-height:85vh;position:relative}
  .wa-header{background:#075E54;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .wa-avatar{width:40px;height:40px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
  .wa-name{font-size:16px;font-weight:600;color:white}
  .wa-status{font-size:12px;color:#b2dfdb;margin-top:1px}
  .wa-dot{display:inline-block;width:7px;height:7px;background:#25D366;border-radius:50%;margin-right:4px}
  .chat-bg{flex:1;overflow-y:auto;padding:12px 10px 8px;background:#e5ddd5;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8b9a8' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");display:flex;flex-direction:column;gap:4px}
  .msg-row{display:flex;flex-direction:column;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg-row.bot{align-items:flex-start}
  .msg-row.user{align-items:flex-end}
  .bubble{max-width:82%;padding:8px 10px 6px;border-radius:8px;font-size:14px;line-height:1.55;word-wrap:break-word;white-space:pre-wrap}
  .bubble.bot{background:white;border-top-left-radius:2px;color:#111;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .bubble.user{background:#dcf8c6;border-top-right-radius:2px;color:#111;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .bubble-time{font-size:10px;color:#8e9ea8;text-align:right;margin-top:2px}
  .bubble.user .bubble-time{color:#6a9f70}
  .wave-link{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 12px;margin-top:8px}
  .wave-icon{width:22px;height:22px;background:#16a34a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0}
  .wave-text-main{font-size:12px;font-weight:600;color:#16a34a}
  .wave-text-sub{font-size:10px;color:#6b7280;margin-top:1px}
  .typing-bubble{background:white;border-radius:8px;border-top-left-radius:2px;padding:10px 14px;display:inline-flex;align-items:center;gap:3px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .typing-dot{width:7px;height:7px;background:#90a4ae;border-radius:50%;animation:typingAnim 1.2s infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes typingAnim{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
  .options-row{display:flex;flex-direction:column;gap:5px;margin-top:6px;align-self:flex-start;width:82%;animation:fadeIn .3s ease}
  .opt-btn{background:white;border:1.5px solid #25D366;color:#075E54;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all .12s;font-family:inherit}
  .opt-btn:hover{background:#f0fdf4}
  .opt-btn:disabled{opacity:.5;cursor:default;border-color:#d1d5db;color:#6b7280}
  .opt-btn.selected{background:#dcf8c6;border-color:#4ade80;color:#166534}
  .input-row{display:flex;gap:6px;margin-top:6px;align-self:stretch;animation:fadeIn .3s ease}
  .chat-input{flex:1;border:1.5px solid #d1d5db;border-radius:22px;padding:9px 14px;font-size:14px;font-family:inherit;outline:none;color:#111;background:white;transition:border-color .15s}
  .chat-input:focus{border-color:#25D366}
  .send-btn{width:38px;height:38px;border-radius:50%;border:none;background:#25D366;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  .send-btn:hover{background:#1db954}
  .send-btn:disabled{background:#d1d5db;cursor:default}

  /* ── PANIER MODAL ── */
  .cart-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s ease}
  .cart-modal{background:white;border-radius:16px 16px 0 0;display:flex;flex-direction:column;max-height:82%}
  .cart-header{background:#075E54;padding:12px 16px;font-size:13px;font-weight:600;color:white;display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0}
  .cart-close{background:rgba(255,255,255,.2);border:none;color:white;font-size:14px;width:26px;height:26px;border-radius:50%;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
  .cart-cats{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid #f0f0f0;scrollbar-width:none;flex-shrink:0}
  .cart-cats::-webkit-scrollbar{display:none}
  .cat-btn{padding:5px 12px;border-radius:20px;border:1px solid #d1d5db;background:white;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:#374151;transition:all .12s;font-family:inherit}
  .cat-btn.active{background:#075E54;border-color:#075E54;color:white}
  .items-list{overflow-y:auto;padding:4px 0;flex:1}
  .item-row{display:flex;align-items:center;padding:9px 14px;gap:8px;border-bottom:1px solid #f5f5f5}
  .item-name{flex:1;font-size:13px;color:#111}
  .item-price{font-size:11px;color:#6b7280;min-width:58px;text-align:right;margin-right:6px}
  .qty-ctrl{display:flex;align-items:center;gap:7px}
  .qty-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid #25D366;background:white;color:#075E54;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;transition:all .1s}
  .qty-btn:hover{background:#f0fdf4}
  .qty-btn:disabled{border-color:#e5e7eb;color:#d1d5db;cursor:default}
  .qty-num{font-size:14px;font-weight:600;color:#111;min-width:16px;text-align:center}
  .cart-footer{padding:12px 14px;background:#f8fafc;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .cart-total{font-size:13px;color:#374151}
  .cart-total strong{color:#075E54;font-size:16px}
  .cart-confirm{padding:9px 20px;background:#25D366;color:white;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .cart-confirm:disabled{background:#d1d5db;cursor:default}
  .cart-min-warn{font-size:10px;color:#ef4444;margin-top:3px;visibility:visible}

  .reset-bar{padding:10px 16px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;justify-content:center;flex-shrink:0}
  .reset-btn{padding:7px 20px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;font-size:12px;font-weight:500;cursor:pointer;color:#6b7280;transition:all .15s;font-family:inherit}
  .reset-btn:hover{background:#f1f5f9;color:#374151}
  .date-divider{text-align:center;margin:8px 0}
  .date-chip{background:rgba(255,255,255,.75);padding:3px 10px;border-radius:10px;font-size:11px;color:#4b5563}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
</style>
</head>
<body>

<div class="demo-banner">Simulateur Bot — Cleanner Dakar</div>
<div class="scenario-bar">
  <span class="scenario-label">Scénario :</span>
  <button class="scenario-btn active" onclick="setScenario('new',this)">Nouveau client</button>
  <button class="scenario-btn" onclick="setScenario('returning',this)">Client régulier</button>
</div>

<div class="phone">
  <div class="wa-header">
    <div class="wa-avatar">C</div>
    <div>
      <div class="wa-name">Cleanner</div>
      <div class="wa-status"><span class="wa-dot"></span>en ligne</div>
    </div>
  </div>
  <div class="chat-bg" id="chat">
    <div class="date-divider"><span class="date-chip">Aujourd'hui</span></div>
  </div>
  <div class="reset-bar"><button class="reset-btn" onclick="resetChat()">Recommencer</button></div>
</div>

<script>
let scenario = 'new', isTyping = false;
let mem = { prenom:'', adresse:'', mapsLink:'', creneau:'', cart:[], total:0 };

// ── TARIFS ───────────────────────────────────────────────
const CATALOGUE = [
  { cat:'Vêtements courants', items:[
    { name:'T-shirt / Polo / Short',       prix:500  },
    { name:'Sous-vêtements',               prix:500  },
    { name:'Écharpe / Foulard / Cravate',  prix:1000 },
    { name:'Pantalon',                     prix:1000 },
    { name:'Chemise / Chemisier',          prix:1000 },
    { name:'Jupe courte',                  prix:1000 },
    { name:'Pull / Gilet',                 prix:1500 },
    { name:'Jupe longue',                  prix:3000 },
  ]},
  { cat:'Tenues habillées', items:[
    { name:'Veste (homme ou femme)',        prix:2500 },
    { name:'Robe',                          prix:2500 },
    { name:'Jacket',                        prix:3000 },
    { name:'Costume 2 pièces',              prix:3500 },
    { name:'Costume 3 pièces',              prix:4500 },
    { name:'Robe de soirée',               prix:5000 },
    { name:'Imperméable / Manteau',        prix:8000 },
  ]},
  { cat:'Tenues africaines', items:[
    { name:'Djellaba',                     prix:2500 },
    { name:'Boubou caftan léger',          prix:2500 },
    { name:'Boubou caftan 2 pièces',       prix:3000 },
    { name:'Boubou caftan 3 pièces',       prix:4000 },
    { name:'Robe trad. 1 pièce',           prix:2000 },
    { name:'Robe trad. 2 pièces',          prix:2500 },
    { name:'Robe trad. 3 pièces',          prix:3000 },
  ]},
  { cat:'Linge de maison', items:[
    { name:'Taie d\'oreiller / Traversin', prix:500  },
    { name:'Serviette de table',           prix:500  },
    { name:'Nappe',                        prix:1000 },
    { name:'Drap blanc / housse',          prix:1500 },
    { name:'Drap couleur',                 prix:1700 },
    { name:'Housse de couette',            prix:2000 },
    { name:'Couette synthétique',          prix:21000},
  ]},
];

let qtys = {}; // itemName -> qty
let currentCat = 0;

function ts(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')}

// ── STATES ──────────────────────────────────────────────
const states = {
  new_welcome:{
    text:'👋 Bienvenue chez *Cleanner* !\n\nLa blanchisserie qui vient à vous à Dakar 🧺\n\nC\'est votre première commande ?',
    options:[
      {label:'1️⃣  Oui, je suis nouveau(elle)',goto:'new_reg_prenom'},
      {label:'2️⃣  J\'ai déjà un compte',      goto:'existing_lookup'}
    ]
  },
  existing_lookup:{
    text:'🔍 Votre *prénom* pour retrouver votre compte ?',
    input:{placeholder:'Votre prénom…',save:(v)=>{mem.prenom=v},goto:'existing_found'}
  },
  existing_found:{
    textFn:()=>`✅ Compte trouvé — bon retour *${mem.prenom}* ! 👋\n\n📍 Adresse enregistrée : *${mem.adresse||'Sacré-Cœur 3'}*`,
    auto:'order_cart'
  },
  new_reg_prenom:{
    text:'Super ! On crée votre profil en 2 questions.\n\nVotre *prénom* ?',
    input:{placeholder:'Tapez votre prénom…',save:(v)=>{mem.prenom=v},goto:'new_reg_adresse'}
  },
  new_reg_adresse:{
    textFn:()=>`Bonjour *${mem.prenom}* ! 👋\n\nPour votre adresse de collecte :`,
    options:[
      {label:'📍  Partager ma géolocalisation',  goto:'new_reg_geoloc'},
      {label:'✏️  Saisir manuellement',           goto:'new_reg_adresse_manual'}
    ]
  },
  new_reg_adresse_manual:{
    text:'Entrez votre adresse :\n_(ex: Sacré-Cœur 3, villa rose en face de la pharmacie)_',
    input:{placeholder:'Tapez votre adresse…',save:(v)=>{mem.adresse=v},goto:'new_reg_confirm'}
  },
  new_reg_geoloc:{geo:true,goto:'new_reg_confirm'},
  new_reg_confirm:{
    textFn:()=>`✅ Parfait *${mem.prenom}* ! Votre profil est créé.\n📍 *${mem.adresse}*`,
    auto:'order_cart'
  },

  // ── PANIER ──
  order_cart:{
    text:'🛒 *Sélectionnez vos articles*\n\nAjoutez vos pièces — le montant estimé se calcule en temps réel 👇',
    cart:true
  },

  order_creneau:{
    text:'📅 Quel créneau vous convient ?',
    options:[
      {label:'🌅  Demain matin (8h–12h)',       save:()=>{mem.creneau='Demain matin · 8h–12h'},       goto:'order_adresse'},
      {label:'☀️  Demain après-midi (14h–18h)', save:()=>{mem.creneau='Demain après-midi · 14h–18h'}, goto:'order_adresse'},
      {label:'📆  Choisir un autre jour',         goto:'order_autre_jour'}
    ]
  },
  order_autre_jour:{
    text:'📆 Quel jour vous convient ?',
    options:[
      {label:'Dans 2 jours (matin)',      save:()=>{mem.creneau='Dans 2 jours · 8h–12h'},      goto:'order_adresse'},
      {label:'Dans 2 jours (après-midi)', save:()=>{mem.creneau='Dans 2 jours · 14h–18h'},    goto:'order_adresse'},
      {label:'Dans 3 jours (matin)',      save:()=>{mem.creneau='Dans 3 jours · 8h–12h'},     goto:'order_adresse'}
    ]
  },
  order_adresse:{
    textFn:()=>`📍 Collecte à votre adresse habituelle ?\n→ *${mem.adresse}*`,
    options:[
      {label:'✅  Oui, c\'est correct',  goto:'order_recap'},
      {label:'✏️  Modifier l\'adresse',  goto:'order_adresse_modif'}
    ]
  },
  order_adresse_modif:{
    text:'Nouvelle adresse de collecte :',
    input:{placeholder:'Votre adresse…',save:(v)=>{mem.adresse=v},goto:'order_recap'}
  },
  order_recap:{
    textFn:()=>{
      const lines = mem.cart.map(i=>`  · ${i.name} ×${i.qty} = ${(i.prix*i.qty).toLocaleString()} F`).join('\n');
      const fraisLivraison = 1500;
      return `🧾 *Récap de votre commande*\n\n👤 ${mem.prenom}\n📍 ${mem.adresse}${mem.mapsLink?'\n🔗 '+mem.mapsLink:''}\n📅 ${mem.creneau}\n\n*Articles :*\n${lines}\n\n💰 Sous-total : *${mem.total.toLocaleString()} FCFA*\n🚚 Livraison : *${fraisLivraison.toLocaleString()} FCFA*\n─────────────\n✅ *Total estimé : ${(mem.total+fraisLivraison).toLocaleString()} FCFA*\n\n─────────────────\nPour confirmer votre créneau, réglez les *frais de réservation : 500 FCFA*\n_(déduits de votre facture finale)_\n\n⏳ Lien valable 30 minutes`;
    },
    wave:true,
    options:[
      {label:'💸  J\'ai effectué le paiement Wave', goto:'order_confirmed'},
      {label:'✏️  Modifier ma commande',             goto:'order_cart'}
    ]
  },
  order_confirmed:{
    textFn:()=>`✅ *Créneau confirmé, ${mem.prenom} !*\n\nPaiement reçu — merci 🙏\n\n🔢 Commande *#${String(Math.floor(Math.random()*9000)+1000)}*\n📅 ${mem.creneau}\n💰 Total estimé : *${(mem.total+1500).toLocaleString()} FCFA*\n\nOn arrive avec votre sac numéroté.\nÀ bientôt ! 👋`
  },

  // ── RÉGULIER ──
  returning_welcome:{
    textFn:()=>`👋 Bon retour *${mem.prenom||'Amadou'}* !\n\nQue souhaitez-vous faire ?`,
    options:[
      {label:'1️⃣  Passer une commande',    goto:'order_cart'},
      {label:'2️⃣  Suivre ma commande',     goto:'returning_tracking'},
      {label:'3️⃣  Parler à un conseiller', goto:'returning_conseiller'}
    ]
  },
  returning_tracking:{
    text:'🔍 Statut de votre dernière commande :\n\n🔢 Commande *#0087*\n📅 Collectée hier\n\n🔄 *En traitement* chez notre partenaire.\n\nVous serez notifié dès que c\'est prêt. 🧺'
  },
  returning_conseiller:{
    text:'👤 Un conseiller vous répond très vite.\n\nHoraires : *lundi–samedi, 8h–19h* 🙏'
  },
  returning_recap:{
    textFn:()=>{
      const lines = mem.cart.map(i=>`  · ${i.name} ×${i.qty} = ${(i.prix*i.qty).toLocaleString()} F`).join('\n');
      const fraisLivraison = 1500;
      return `🧾 *Récap de votre commande*\n\n👤 ${mem.prenom||'Amadou'}\n📍 ${mem.adresse}\n📅 ${mem.creneau}\n\n*Articles :*\n${lines}\n\n💰 Sous-total : *${mem.total.toLocaleString()} FCFA*\n🚚 Livraison : *${fraisLivraison.toLocaleString()} FCFA*\n─────────────\n✅ *Total estimé : ${(mem.total+fraisLivraison).toLocaleString()} FCFA*\n\n─────────────────\n✅ Client régulier — *pas de frais de réservation*\n\nConfirmer ?`;
    },
    options:[
      {label:'✅  Confirmer',    goto:'returning_confirmed'},
      {label:'✏️  Modifier',     goto:'order_cart'}
    ]
  },
  returning_confirmed:{
    textFn:()=>`✅ *Commande confirmée, ${mem.prenom||'Amadou'} !*\n\n🔢 Commande *#${String(Math.floor(Math.random()*9000)+1000)}*\n📅 ${mem.creneau}\n💰 Total estimé : *${(mem.total+1500).toLocaleString()} FCFA*\n\nÀ bientôt ! 👋`
  }
};

function resolveState(key){
  if(scenario==='returning'&&key==='order_recap') return states['returning_recap'];
  return states[key];
}
function renderText(s){return s.textFn?s.textFn():s.text}

function addBotMsg(text,wave){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='msg-row bot';
  const html=text
    .replace(/\*(.*?)\*/g,'<strong>$1</strong>')
    .replace(/_(.*?)_/g,'<em style="color:#6b7280;font-style:italic">$1</em>')
    .replace(/(https:\/\/maps\.google\.com\/\?q=[\d.,]+)/g,'<a href="$1" target="_blank" style="color:#1a73e8;font-size:12px;text-decoration:none">📍 Voir sur Google Maps</a>');
  const waveHtml=wave?`<div class="wave-link"><div class="wave-icon">W</div><div><div class="wave-text-main">Payer 500 FCFA — Wave</div><div class="wave-text-sub">wave.com/s/XXXXXX · expire dans 30 min</div></div></div>`:'';
  row.innerHTML=`<div class="bubble bot">${html}${waveHtml}<div class="bubble-time">${ts()}</div></div>`;
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight+9999;
}
function addUserMsg(text){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML=`<div class="bubble user">${text}<div class="bubble-time">${ts()} ✓✓</div></div>`;
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight+9999;
}
function showTyping(){
  if(isTyping)return;isTyping=true;
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg-row bot';d.id='typing-row';
  d.innerHTML=`<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight+9999;
}
function hideTyping(){const r=document.getElementById('typing-row');if(r)r.remove();isTyping=false}
function clearWidget(){const r=document.getElementById('widget');if(r)r.remove();
  const o=document.querySelector('.cart-overlay');if(o)o.remove();}

function showOptions(options,onPick){
  clearWidget();
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='options-row';row.id='widget';
  options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=opt.label;
    btn.onclick=()=>{
      if(isTyping)return;
      row.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      btn.classList.add('selected');
      if(opt.save)opt.save();
      setTimeout(()=>{clearWidget();addUserMsg(opt.label);onPick(opt.goto)},180);
    };
    row.appendChild(btn);
  });
  chat.appendChild(row);chat.scrollTop=chat.scrollHeight+9999;
}

function showInput(cfg,onSubmit){
  clearWidget();
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='input-row';row.id='widget';
  const inp=document.createElement('input');
  inp.type='text';inp.className='chat-input';inp.placeholder=cfg.placeholder;inp.maxLength=80;
  const btn=document.createElement('button');
  btn.className='send-btn';btn.innerHTML='➤';btn.disabled=true;
  inp.addEventListener('input',()=>{btn.disabled=inp.value.trim().length<2});
  inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!btn.disabled)submit()});
  btn.onclick=submit;
  function submit(){
    const val=inp.value.trim();if(val.length<2)return;
    if(cfg.save)cfg.save(val);clearWidget();addUserMsg(val);onSubmit(cfg.goto);
  }
  row.appendChild(inp);row.appendChild(btn);
  chat.appendChild(row);chat.scrollTop=chat.scrollHeight+9999;
  setTimeout(()=>inp.focus(),100);
}

// ── PANIER WIDGET ─────────────────────────────────────────
function buildCartSummary(){
  let total=0;
  for(const [name,qty] of Object.entries(qtys)){
    for(const cat of CATALOGUE)for(const item of cat.items)if(item.name===name){total+=item.prix*qty;break}
  }
  return total;
}

function safeId(name){return 'q_'+name.replace(/[^a-zA-Z0-9]/g,'_')}

function renderCatItems(catIndex,listEl){
  while(listEl.firstChild)listEl.removeChild(listEl.firstChild);
  CATALOGUE[catIndex].items.forEach(function(item){
    const qty=qtys[item.name]||0;
    const row=document.createElement('div');
    row.className='item-row';

    const nameEl=document.createElement('div');
    nameEl.className='item-name';
    nameEl.textContent=item.name;

    const priceEl=document.createElement('div');
    priceEl.className='item-price';
    priceEl.textContent=item.prix.toLocaleString()+' F';

    const ctrl=document.createElement('div');
    ctrl.className='qty-ctrl';

    const btnM=document.createElement('button');
    btnM.className='qty-btn';btnM.textContent='−';
    btnM.setAttribute('data-name',item.name);btnM.setAttribute('data-dir','-1');
    if(qty===0)btnM.disabled=true;

    const numEl=document.createElement('div');
    numEl.className='qty-num';numEl.id=safeId(item.name);numEl.textContent=qty;

    const btnP=document.createElement('button');
    btnP.className='qty-btn';btnP.textContent='+';
    btnP.setAttribute('data-name',item.name);btnP.setAttribute('data-dir','1');

    ctrl.appendChild(btnM);ctrl.appendChild(numEl);ctrl.appendChild(btnP);
    row.appendChild(nameEl);row.appendChild(priceEl);row.appendChild(ctrl);
    listEl.appendChild(row);
  });
}

function showCart(onConfirm){
  clearWidget();
  qtys={};
  const phone=document.querySelector('.phone');

  const overlay=document.createElement('div');
  overlay.className='cart-overlay';overlay.id='widget';
  const widget=document.createElement('div');
  widget.className='cart-modal';
  overlay.appendChild(widget);

  // header
  const header=document.createElement('div');
  header.className='cart-header';
  const headerTitle=document.createElement('span');
  headerTitle.textContent='🛒 Vos articles — prix indicatifs';
  const closeBtn=document.createElement('button');
  closeBtn.className='cart-close';closeBtn.textContent='✕';
  closeBtn.onclick=function(){ clearWidget(); addUserMsg('❌ Sélection annulée'); };
  header.appendChild(headerTitle);header.appendChild(closeBtn);

  // cats bar
  const catsBar=document.createElement('div');
  catsBar.className='cart-cats';

  // items list
  const itemsList=document.createElement('div');
  itemsList.className='items-list';

  // footer
  const footer=document.createElement('div');
  footer.className='cart-footer';

  const totalWrap=document.createElement('div');
  const totalLine=document.createElement('div');
  totalLine.className='cart-total';
  totalLine.innerHTML='Estimé (+ livraison) : <span id="ctv">1 500</span> FCFA';
  const warnLine=document.createElement('div');
  warnLine.className='cart-min-warn';warnLine.id='cwarn';warnLine.textContent='Minimum 5 articles';
  totalWrap.appendChild(totalLine);totalWrap.appendChild(warnLine);

  const confirmBtn=document.createElement('button');
  confirmBtn.className='cart-confirm';confirmBtn.textContent='Confirmer →';confirmBtn.disabled=true;

  footer.appendChild(totalWrap);footer.appendChild(confirmBtn);

  widget.appendChild(header);widget.appendChild(catsBar);widget.appendChild(itemsList);widget.appendChild(footer);

  // build cat tabs
  CATALOGUE.forEach(function(cat,i){
    const btn=document.createElement('button');
    btn.className='cat-btn'+(i===0?' active':'');
    btn.textContent=cat.cat;
    btn.onclick=function(){
      catsBar.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      renderCatItems(i,itemsList);
    };
    catsBar.appendChild(btn);
  });

  renderCatItems(0,itemsList);

  // qty events via delegation
  widget.addEventListener('click',function(e){
    const btn=e.target.closest('.qty-btn');
    if(!btn)return;
    const name=btn.getAttribute('data-name');
    const dir=parseInt(btn.getAttribute('data-dir'));
    if(!qtys[name])qtys[name]=0;
    qtys[name]+=dir;
    if(qtys[name]<0)qtys[name]=0;

    const numEl=widget.querySelector('#'+safeId(name));
    if(numEl)numEl.textContent=qtys[name];

    const minusBtn=btn.closest('.qty-ctrl').querySelector('[data-dir="-1"]');
    if(minusBtn)minusBtn.disabled=(qtys[name]===0);

    const total=buildCartSummary();
    const totalItems=Object.values(qtys).reduce(function(a,b){return a+b},0);

    const ctvEl=widget.querySelector('#ctv');
    if(ctvEl)ctvEl.textContent=(total+1500).toLocaleString();

    const w=widget.querySelector('#cwarn');
    if(totalItems>=5){
      confirmBtn.disabled=false;
      if(w)w.style.visibility='hidden';
    } else {
      confirmBtn.disabled=true;
      if(w){w.style.visibility='visible';w.textContent='Minimum 5 articles ('+totalItems+' sélectionné'+(totalItems>1?'s':'')+')';}
    }
  });

  confirmBtn.onclick=function(){
    const items=[];
    CATALOGUE.forEach(function(cat){cat.items.forEach(function(item){
      if(qtys[item.name]>0)items.push({name:item.name,prix:item.prix,qty:qtys[item.name]});
    })});
    mem.cart=items;mem.total=buildCartSummary();
    const totalItems=Object.values(qtys).reduce(function(a,b){return a+b},0);
    clearWidget();
    addUserMsg('🛒 '+totalItems+' pièces — '+(mem.total+1500).toLocaleString()+' FCFA estimé');
    onConfirm('order_creneau');
  };

  phone.appendChild(overlay);
}

// ── RUN STATE ─────────────────────────────────────────────
function runState(key){
  if(!key)return;
  const state=resolveState(key);
  if(!state)return;

  // GEO
  if(state.geo){
    addBotMsg('📍 Appuyez sur *Autoriser* pour partager votre position.\n\n_(Dans WhatsApp, appuyez sur 📎 → Localisation)_');
    setTimeout(()=>{
      clearWidget();
      const chat=document.getElementById('chat');
      const row=document.createElement('div');
      row.className='options-row';row.id='widget';
      const geoBtn=document.createElement('button');
      geoBtn.className='opt-btn';
      geoBtn.textContent='📍  Partager ma position maintenant';
      geoBtn.onclick=()=>{
        geoBtn.textContent='⏳  Localisation en cours...';geoBtn.disabled=true;
        if(!navigator.geolocation){clearWidget();addUserMsg('📍 Position partagée');runState(state.goto);return}
        navigator.geolocation.getCurrentPosition(
          (pos)=>{
            const lat=pos.coords.latitude.toFixed(5),lng=pos.coords.longitude.toFixed(5);
            clearWidget();addUserMsg('📍 Position partagée');showTyping();
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
              .then(r=>r.json())
              .then(data=>{
                hideTyping();
                const addr=data.display_name?data.display_name.split(',').slice(0,3).join(', '):`${lat}, ${lng}`;
                mem.adresse=addr;mem.mapsLink=`https://maps.google.com/?q=${lat},${lng}`;
                addBotMsg(`✅ Position reçue !\n\n📍 *${addr}*\n🔗 https://maps.google.com/?q=${lat},${lng}\n\nC'est bien votre adresse de collecte ?`);
                setTimeout(()=>showOptions([
                  {label:"✅  Oui, c'est correct",     goto:state.goto},
                  {label:"✏️  Corriger l'adresse",     goto:'new_reg_adresse_manual'}
                ],(next)=>setTimeout(()=>runState(next),300)),300);
              })
              .catch(()=>{hideTyping();mem.adresse=`${lat}, ${lng}`;addBotMsg('✅ Position reçue !');setTimeout(()=>runState(state.goto),400)});
          },
          ()=>{clearWidget();addBotMsg('⚠️ Localisation refusée. Entrez votre adresse manuellement :');
            setTimeout(()=>showInput({placeholder:'Votre adresse…',save:(v)=>{mem.adresse=v},goto:state.goto},(next)=>setTimeout(()=>runState(next),300)),300)}
        );
      };
      row.appendChild(geoBtn);chat.appendChild(row);chat.scrollTop=chat.scrollHeight+9999;
    },300);
    return;
  }

  // CART
  if(state.cart){
    showTyping();
    setTimeout(()=>{
      hideTyping();
      addBotMsg(renderText(state));
      showCart(function(next){ setTimeout(()=>runState(next),300); });
    },900);
    return;
  }

  // AUTO
  const text=renderText(state);
  const typingMs=Math.min(400+text.length*13,1500);
  showTyping();
  setTimeout(()=>{
    hideTyping();addBotMsg(text,state.wave);
    if(state.auto){setTimeout(()=>runState(state.auto),300);return}
    if(state.input){setTimeout(()=>showInput(state.input,(next)=>setTimeout(()=>runState(next),300)),200)}
    else if(state.options){setTimeout(()=>showOptions(state.options,(next)=>setTimeout(()=>runState(next),300)),200)}
  },typingMs);
}

function setScenario(s,btn){
  scenario=s;
  document.querySelectorAll('.scenario-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');resetChat();
}
function resetChat(){
  mem={prenom:scenario==='returning'?'Amadou':'',adresse:scenario==='returning'?'Cité Keur Gorgui, Apt 12':'',mapsLink:'',creneau:'',cart:[],total:0};
  qtys={};currentCat=0;isTyping=false;
  const chat=document.getElementById('chat');
  chat.innerHTML='<div class="date-divider"><span class="date-chip">Aujourd\'hui</span></div>';
  clearWidget();
  runState(scenario==='returning'?'returning_welcome':'new_welcome');
}
resetChat();
</script>
